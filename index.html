<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>bowl — phase 2</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <video id="webcam" autoplay playsinline muted></video>
    <video id="environment" autoplay playsinline muted loop></video>
    <canvas id="game" aria-label="bowl phase 2 mechanics"></canvas>
    <div id="nav-controls" aria-label="Game navigation">
      <button id="nav-back" type="button">back</button>
      <button id="nav-restart" type="button">restart</button>
    </div>
    <button id="dev-toggle" type="button" aria-expanded="false">tune</button>
    <aside id="dev-panel" hidden aria-label="Mechanics tuning panel"></aside>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
